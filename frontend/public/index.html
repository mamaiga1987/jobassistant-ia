<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JobAssistant IA</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; }
      body.light-mode { background: #f1f5f9 !important; }
      body.light-mode [class*="card"] { background: #fff !important; }
      
      /* Mode clair - textes */
      body.light-mode * { 
        color: #1e293b !important;
      }
      /* Exceptions - boutons et éléments colorés gardent leur couleur */
      body.light-mode button[style*="background:linear-gradient"] { 
        color: #fff !important; 
      }
      body.light-mode span[style*="color:#a78bfa"],
      body.light-mode span[style*="color:#8b5cf6"],
      body.light-mode span[style*="color:#22c55e"],
      body.light-mode span[style*="color:#ef4444"],
      body.light-mode span[style*="color:#f59e0b"],
      body.light-mode span[style*="color:#10b981"] {
        color: inherit !important;
      }
      /* Logo lettres */
      body.light-mode .logo-letter * { color: #8b5cf6 !important; }
      /* Inputs */
      body.light-mode input, body.light-mode textarea, body.light-mode select {
        background: #f8fafc !important;
        border-color: #cbd5e1 !important;
        color: #1e293b !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
